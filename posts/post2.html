<div class="container">

    <div class="post">
        <h2>Problem</h2>
        <p>
            Find all functions f such that f(x + y) = f(x)f(y) for all real numbers.
        </p>

        <h2>Solution</h2>
        <p>
            This is a well-known functional equation. Assuming continuity (or other mild conditions),
            the solutions are exponential functions of the form f(x) = e^(cx).
        </p>
